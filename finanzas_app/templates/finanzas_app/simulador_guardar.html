{% extends 'layouts/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Guardar Simulación{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-5 mx-auto">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h4 class="fw-bold mb-3">
                <i class="bi bi-cloud-arrow-up me-2 text-success"></i>Guardar simulación
            </h4>
            <p class="text-muted small">
                Elige el mes y año al que pertenece esta simulación para guardarla en tu cuenta.
            </p>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                    <a href="{% url 'finanzas:simulador' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
